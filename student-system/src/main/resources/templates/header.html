<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<header th:fragment="header" class="app-header">
    <div class="header-content">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-icon">
                <i data-lucide="graduation-cap"></i>
            </div>
            <div class="logo-text">
                <h1 th:text="${portalName} ?: 'Cổng Tuyển Sinh Đại Học'">Cổng Tuyển Sinh Đại Học</h1>
            </div>
        </div>

        <ul class="nav-center">


            <li>
                <a href="/login"
                   class="nav-link"
                   data-page="register">
                    <i data-lucide="file-search"></i>
                    <span>Tra cứu kết quả xét tuyển</span>
                </a>
            </li>
            <li>
                <a href="/tracuutinhdiemxettuyen"
                   class="nav-link"
                   data-page="tracuutinhdiemxettuyen">
                    <i data-lucide="file-search"></i>
                    <span>Tra cứu cách tính điểm xét tuyển</span>
                </a>
            </li>
        </ul>



    </div>
</header>

<!-- ==================== CSS ==================== -->
<style th:fragment="header-style">
    /* ==========================================================================
    1. ROOT VARIABLES
    ========================================================================== */
 :root {
     /* Core Colors - University Brand */
     --primary-color: #003366;
     --primary-light: #2563eb;
     --primary-dark: #1e40af;
     --secondary-color: #a50000;

     /* Neutral Palette */
     --white: #ffffff;
     --bg-body: #f8fafc;
     --text-main: #0f172a;
     --text-muted: #64748b;
     --text-soft: #94a3b8;
     --border-color: #e2e8f0;

     /* Functional Colors */
     --success: #10b981;
     --error: #ef4444;
     --error-light: #fee2e2;
     --error-hover: #fecaca;
     --active-bg: #eff6ff;

     /* Dimensions & Spacing */
     --header-height: 74px;
     --container-max: 1400px;
     --radius-sm: 8px;
     --radius-md: 12px;
     --radius-full: 9999px;

     /* Shadows & Transitions */
     --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
     --shadow-active: 0 2px 6px rgba(37, 99, 235, 0.15);
     --transition: all 0.25s ease;
 }

 /* ==========================================================================
    2. RESET + BASE
    ========================================================================== */
 *, *::before, *::after {
     margin: 0;
     padding: 0;
     box-sizing: border-box;
 }

 body {
     font-family: 'Inter', system-ui, -apple-system, sans-serif;
     background-color: var(--bg-body);
     color: var(--text-main);
     line-height: 1.5;
 }

 /* ==========================================================================
    3. MAIN LAYOUT
    ========================================================================== */
 .app-header {
     background: var(--white);
     border-bottom: 1px solid var(--border-color);
     box-shadow: var(--shadow-sm);
     position: sticky;
     top: 0;
     z-index: 1000;
     width: 100%;
 }

 .header-content {
     max-width: var(--container-max);
     margin: 0 auto;
     padding: 0 32px;
     height: var(--header-height);
     display: flex;
     align-items: center;
     justify-content: space-between;
     gap: 20px;
 }

 /* ==========================================================================
    4. HEADER (Logo Section)
    ========================================================================== */
 .logo-section {
     display: flex;
     align-items: center;
     gap: 12px;
     flex-shrink: 0;
 }

 .logo-icon {
     width: 44px;
     height: 44px;
     background: linear-gradient(135deg, var(--primary-light), var(--primary-dark));
     border-radius: 10px;
     display: flex;
     align-items: center;
     justify-content: center;
     color: var(--white);
     font-size: 22px;
     transition: var(--transition);
 }

 .logo-text h1 {
     font-size: 19px;
     font-weight: 700;
     color: var(--text-main);
     margin: 0;
     letter-spacing: -0.3px;
     white-space: nowrap;
 }

 /* ==========================================================================
    5. TABS / NAVIGATION
    ========================================================================== */
 .nav-center {
     display: flex;
     align-items: center;
     gap: 8px;
     list-style: none;
     margin: 0;
     padding: 0;
     flex: 1;
     justify-content: center;
 }

 .nav-link {
     display: flex;
     align-items: center;
     gap: 9px;
     padding: 11px 22px;
     border-radius: var(--radius-full);
     text-decoration: none;
     font-size: 14.5px;
     font-weight: 500;
     color: var(--text-muted);
     transition: var(--transition);
     white-space: nowrap;
 }

 .nav-link:hover {
     background: #f8fafc;
     color: #334155;
 }

 .nav-link.active {
     background: var(--active-bg);
     color: var(--primary-light);
     font-weight: 600;
     box-shadow: var(--shadow-active);
 }

 .nav-link.active i {
     color: var(--primary-light);
 }

 .nav-link i {
     width: 19px;
     height: 19px;
     display: flex;
     align-items: center;
     justify-content: center;
 }

 /* ==========================================================================
    6. FORM GRID / ALERTS (Global Utilities)
    ========================================================================== */
 /* Dành cho các trang sử dụng Grid nội dung bên dưới header */
 .grid-container {
     display: grid;
     grid-template-columns: repeat(12, 1fr);
     gap: 24px;
     width: 100%;
 }

 .full-width {
     grid-column: 1 / -1 !important;
 }

 /* ==========================================================================
    9. ACTION BUTTONS (Logout & Controls)
    ========================================================================== */
 .logout-btn {
     display: flex;
     align-items: center;
     gap: 8px;
     padding: 10px 20px;
     background: var(--error-light);
     color: var(--error);
     border: none;
     border-radius: var(--radius-full);
     font-size: 14px;
     font-weight: 500;
     cursor: pointer;
     transition: var(--transition);
     flex-shrink: 0;
 }

 .logout-btn:hover {
     background: var(--error-hover);
     transform: translateY(-1px);
 }

 .logout-btn i {
     width: 18px;
     height: 18px;
 }

 /* ==========================================================================
    11. ANIMATION
    ========================================================================== */
 @keyframes slideDown {
     from { transform: translateY(-100%); }
     to { transform: translateY(0); }
 }

 .app-header {
     animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1);
 }

 /* ==========================================================================
    12. RESPONSIVE
    ========================================================================== */
 @media (max-width: 1024px) {
     .header-content {
         padding: 0 16px;
     }

     .nav-link {
         padding: 8px 16px;
         font-size: 13.5px;
     }
 }

 @media (max-width: 768px) {
     .header-content {
         height: auto;
         padding: 12px 16px;
         flex-wrap: wrap;
         justify-content: center;
     }

     .logo-section {
         width: 100%;
         justify-content: center;
         margin-bottom: 12px;
     }

     .nav-center {
         order: 3;
         width: 100%;
         overflow-x: auto;
         justify-content: flex-start;
         padding-bottom: 4px;
     }

     .logout-btn {
         position: absolute;
         top: 12px;
         right: 16px;
         padding: 8px;
     }

     .logout-btn span {
         display: none; /* Ẩn chữ trên mobile để tiết kiệm diện tích */
     }
 }
</style>

<!-- Script -->
<script th:fragment="header-script">
    lucide.createIcons();
    function handleLogout() {
        if (confirm("Bạn có chắc chắn muốn đăng xuất?")) {
            window.location.href = "/logout";
        }
    }
</script>

</html>
