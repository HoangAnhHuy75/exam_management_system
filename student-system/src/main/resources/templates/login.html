<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập - Admission Portal</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="container">
    <!-- Header / Logo -->
    <div class="logo">
        <h1>The Academic Architect</h1>
        <p>Cổng Tuyển sinh Đại học Chính thức</p>
    </div>

    <!-- Card đăng nhập -->
    <div class="card">
        <h2>Đăng nhập hệ thống</h2>
        <p>Sử dụng mã số CCCD / Định danh cá nhân và mật khẩu để truy cập hồ sơ của bạn.</p>

        <!-- Thông báo lỗi -->
        <div class="error" th:if="${error}">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>SỐ CCCD / MÃ ĐỊNH DANH</label>
                <input type="text"
                       name="cccd"
                       placeholder="00120300XXXX"
                       required>
            </div>

            <div class="form-group">
                <label>MẬT KHẨU</label>
                <input type="password"
                       name="password"
                       placeholder="Nhập mật khẩu"
                       required>
            </div>

            <button type="submit" class="btn">Đăng nhập →</button>
        </form>

        <!-- Link đăng ký (nếu cần) -->
        <div class="register-link">
            Chưa có tài khoản?
            <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</div>

</body>
</html>
